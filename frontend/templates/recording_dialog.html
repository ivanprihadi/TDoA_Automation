<!-- Recording Dialog Modal -->
<div id="recordingModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close">&times;</span>
            <h2>🎙️ Start Recording Session</h2>
        </div>
        
        <div class="modal-body">
            <form id="recordingForm">
                
                <!-- Reference Frequency -->
                <div class="form-group">
                    <label for="refFreq">
                        <span class="label-icon">📡</span>
                        Reference Frequency (MHz):
                    </label>
                    <input type="number" 
                           id="refFreq" 
                           name="refFreq" 
                           min="87" 
                           max="108" 
                           step="0.1" 
                           value="100.0"
                           required>
                    <span class="help-text">FM broadcast band: 87-108 MHz</span>
                </div>
                
                <!-- Target Frequency -->
                <div class="form-group">
                    <label for="targetFreq">
                        <span class="label-icon">🎯</span>
                        Target Frequency (MHz):
                    </label>
                    <input type="number" 
                           id="targetFreq" 
                           name="targetFreq" 
                           min="87" 
                           max="108" 
                           step="0.1" 
                           value="93.8"
                           required>
                    <span class="help-text">Frequency to be localized (must be different from reference)</span>
                </div>
                
                <!-- Number of Loops -->
                <div class="form-group">
                    <label for="numLoops">
                        <span class="label-icon">🔄</span>
                        Number of Recording Loops:
                    </label>
                    <input type="number" 
                           id="numLoops" 
                           name="numLoops" 
                           min="1" 
                           max="100" 
                           value="1"
                           required>
                    <span class="help-text">How many times to repeat the recording sequence</span>
                </div>
                
                <!-- Synchronization Mode -->
                <div class="form-group">
                    <label>
                        <span class="label-icon">🛰️</span>
                        Synchronization Mode:
                    </label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" 
                                   name="syncMode" 
                                   value="ntp" 
                                   checked>
                            <span class="radio-text">NTP (Internet)</span>
                            <span class="radio-desc">~1ms accuracy, requires internet connection</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" 
                                   name="syncMode" 
                                   value="gps">
                            <span class="radio-text">GPS (Satellite)</span>
                            <span class="radio-desc">~nanosecond accuracy, requires GPS receiver</span>
                        </label>
                    </div>
                </div>
                
                <!-- Status Display -->
                <div id="statusDisplay" class="status-box info" style="display: none;">
                    <p id="statusText"></p>
                </div>
                
                <!-- Progress Bar -->
                <div id="progressContainer" class="progress-container" style="display: none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <p id="progressText" class="progress-text"></p>
                </div>
                
            </form>
        </div>
        
        <div class="modal-footer">
            <button id="cancelBtn" class="btn btn-secondary">✕ Cancel</button>
            <button id="startBtn" class="btn btn-primary">
                <span class="btn-icon">▶️</span> Start Recording
            </button>
        </div>
    </div>
</div>

<!-- Styling -->
